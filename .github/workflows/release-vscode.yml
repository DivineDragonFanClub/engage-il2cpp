name: Release VS Code extension

on:
  push:
    tags:
      - 'vscode-v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.vsce_target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust_target: aarch64-apple-darwin
            vsce_target: darwin-arm64
            exe_suffix: ""
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            vsce_target: linux-x64
            exe_suffix: ""
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            vsce_target: win32-x64
            exe_suffix: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry & build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build engage + engage-lsp
        working-directory: cli
        run: cargo build --release --target ${{ matrix.rust_target }} --bins

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install extension dependencies
        working-directory: vscode
        run: npm ci

      - name: Compile extension TypeScript
        working-directory: vscode
        run: npm run compile

      - name: Stage binaries into extension
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p vscode/bin
          cp "cli/target/${{ matrix.rust_target }}/release/engage${{ matrix.exe_suffix }}" "vscode/bin/"
          cp "cli/target/${{ matrix.rust_target }}/release/engage-lsp${{ matrix.exe_suffix }}" "vscode/bin/"

      - name: Package VSIX
        working-directory: vscode
        run: npx vsce package --target ${{ matrix.vsce_target }} --out engage-${{ github.ref_name }}-${{ matrix.vsce_target }}.vsix

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: vscode/engage-${{ github.ref_name }}-${{ matrix.vsce_target }}.vsix
          fail_on_unmatched_files: true
